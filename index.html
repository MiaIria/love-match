  :root {
    --primary: #e91e63;
    --primary-dark: #c2185b;
    --secondary: #7c3aed;
    --bg-start: #fce4ec;
    --bg-end: #f3e5f5;
    --card: #ffffff;
    --text: #2d2d2d;
    --text-light: #666;
    --text-muted: #999;
    --gold: #b8860b;
    --success: #10b981;
    --border: #f0e0e6;
    --shadow: 0 4px 24px rgba(0,0,0,0.08);
    --radius: 16px;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    background: linear-gradient(135deg, var(--bg-start) 0%, var(--bg-end) 50%, #fce4ec 100%);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 16px;
    -webkit-tap-highlight-color: transparent;
    -webkit-font-smoothing: antialiased;
    line-height: 1.6;
  }

  .app-container {
    width: 100%;
    max-width: 480px;
    position: relative;
  }

  /* Screen management */
  .screen {
    display: none;
    animation: fadeIn 0.4s ease;
  }
  .screen.active { display: block; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Card base */
  .card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 28px 24px;
    box-shadow: var(--shadow);
    margin-bottom: 16px;
  }

  /* Welcome screen */
  .welcome-icon {
    text-align: center;
    font-size: 56px;
    margin-bottom: 16px;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.08); }
  }
  .welcome-title {
    text-align: center;
    font-size: 22px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 8px;
  }
  .welcome-subtitle {
    text-align: center;
    font-size: 14px;
    color: var(--text-light);
    margin-bottom: 20px;
    line-height: 1.8;
  }
  .welcome-features {

    padding: 0;
    margin-bottom: 20px;
  }
  .welcome-features li {

    font-size: 14px;
    color: var(--text-light);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .welcome-features li::before {
    content: '✦';
    color: var(--primary);
    font-size: 12px;
  }

  .btn {
    display: block;
    width: 100%;
    padding: 14px 24px;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
    font-family: inherit;
  }
  .btn:active { transform: scale(0.97); }
  .btn-primary {
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    color: white;
    box-shadow: 0 4px 16px rgba(233,30,99,0.3);
  }
  .btn-primary:hover { box-shadow: 0 6px 24px rgba(233,30,99,0.4); }
  .btn-outline {
    background: white;
    color: var(--primary);
    border: 2px solid var(--primary);
  }
  .btn-small {
    padding: 10px 20px;
    font-size: 14px;
    width: auto;
    display: inline-block;
  }

  .progress-wrap {
    margin-bottom: 20px;
  }
  .progress-info {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: 6px;

  .progress-bar {
    width: 100%;
    height: 6px;
    background: #f0e0e6;
    border-radius: 3px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--primary), var(--secondary));
    border-radius: 3px;
    transition: width 0.4s ease;
  }

  .stage-badge {

    padding: 4px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    background: linear-gradient(135deg, #fce4ec, #f3e5f5);
    color: var(--primary);

    font-weight: 600;
    color: var(--text);
    margin-bottom: 20px;
    line-height: 1.7;

  .options-list {

    display: flex;

    gap: 10px;

  .option-btn {

    align-items: flex-start;
    gap: 12px;
    padding: 14px 16px;
    border: 2px solid var(--border);
    border-radius: 12px;
    background: white;
    cursor: pointer;
    transition: all 0.2s;
    text-align: left;
    font-family: inherit;
    font-size: 14px;
    color: var(--text);

    height: 28px;

    background: #f5f5f5;

    align-items: center;

    font-weight: 700;
    font-size: 13px;
    color: var(--text-light);

  .transition-icon {

    margin-bottom: 12px;

  .transition-text {

    color: var(--text);

  .loading-spinner {

    border: 4px solid #f0e0e6;
    border-top-color: var(--primary);
    border-radius: 50%;

  .result-label {

    padding: 8px 20px;
    border-radius: 24px;
    font-size: 15px;
    font-weight: 700;
    background: linear-gradient(135deg, #fce4ec, #f3e5f5);

  .bar-label {

    text-align: right;
    color: var(--text-light);

  }
  .bar-track {

    height: 8px;

  .bar-fill {

  .bar-val {

    color: var(--text-muted);
  }
  .section-divider {

    padding: 12px 0;
    font-size: 18px;
    color: var(--primary);

  }
  .highlight {

  }
  .result-footer {
    text-align: center;
    padding: 24px;
    font-size: 14px;
    color: var(--text-light);
    line-height: 1.8;
  }
  .action-buttons {

    margin-top: 20px;

  .toast {

    top: 24px;
    left: 50%;
    transform: translateX(-50%);
    background: #333;
    color: white;
    padding: 10px 24px;
    border-radius: 24px;
    font-size: 14px;
    z-index: 999;

  }
  @keyframes toastIn {
    from { opacity: 0; transform: translateX(-50%) translateY(-12px); }

  }

  /* Responsive */
  @media (max-width: 360px) {
    .card { padding: 20px 16px; }
    .question-text { font-size: 16px; }
    .option-btn { padding: 12px 14px; font-size: 13px; }
  }
</style>

// --- ANALYSIS ENGINE ---
class LoveMatchAnalyzer {
  constructor(answers) {
    this.a = answers; // {1:'A', 2:'B', ...}
    this.scores = {};
    this.classifications = {};
    this.triggeredInsights = [];
    this.label = {};
    this.computeAll();
  }

  ans(id) { return this.a[id]; }

  // --- Dimension Scoring ---
  computeAll() {
    this.scoreD1(); // 依恋风格
    this.scoreD2(); // 情感表达模式
    this.scoreD3(); // 冲突应对风格
    this.scoreD4(); // 亲密距离偏好
    this.scoreD5(); // 爱的语言
    this.scoreD6(); // 关系安全感
    this.scoreD7(); // 情感核心驱动力
    this.checkInsights();
    this.generateLabel();
  }

  // D1: 依恋风格 (0=安全, 100=回避)
  scoreD1() {
    const map = {
      Q3: {A:20, B:55, C:25, D:45},
      Q7: {A:0, B:30, C:55, D:75},
      Q10: {A:0, B:25, C:50, D:80},
      Q14: {A:0, B:30, C:55, D:70},
      Q16: {A:10, B:40, C:65, D:85}
    };
    const vals = [map.Q3[this.ans(3)], map.Q7[this.ans(7)], map.Q10[this.ans(10)], map.Q14[this.ans(14)], map.Q16[this.ans(16)]];
    const avg = vals.reduce((a,b)=>a+b,0)/vals.length;
    this.scores.d1 = Math.round(avg);
    if (avg <= 25) this.classifications.d1 = {type:'安全型', level:'轻度', desc:'你对关系有基本的安全感，相信伴侣会在你需要时出现。'};
    else if (avg <= 45) this.classifications.d1 = {type:'安全型偏回避', level:'轻度回避倾向', desc:'大部分时候你感觉安全，但在某些触发情境下会本能地后退一步。'};
    else if (avg <= 65) this.classifications.d1 = {type:'回避型倾向', level:'中度', desc:'你在关系中习惯保持一定的情感距离，用独立和自给自足来保护自己。'};
    else this.classifications.d1 = {type:'回避型倾向', level:'明显', desc:'你在情感上高度自给自足，亲密关系中的靠近可能让你感到压力或不安。'};
  }

  // D2: 情感表达模式 (0=开放直接, 100=含蓄间接)
  scoreD2() {
    const map = {
      Q5: {A:0, B:35, C:45, D:75},
      Q7: {A:0, B:30, C:55, D:80},
      Q10: {A:0, B:25, C:50, D:80}
    };
    const vals = [map.Q5[this.ans(5)], map.Q7[this.ans(7)], map.Q10[this.ans(10)]];
    const avg = vals.reduce((a,b)=>a+b,0)/vals.length;
    this.scores.d2 = Math.round(avg);
    if (avg <= 25) this.classifications.d2 = {type:'开放直接型', desc:'你习惯坦率表达内心的想法和感受，情绪透明度高。'};
    else if (avg <= 50) this.classifications.d2 = {type:'选择性开放型', desc:'你在信任的人面前可以敞开，但需要对方先给出安全信号。'};
    else if (avg <= 70) this.classifications.d2 = {type:'含蓄间接型', desc:'你更习惯用行动或间接方式表达情感，说出口的话都是经过深思熟虑的。'};
    else this.classifications.d2 = {type:'深度内敛型', desc:'你的情感世界丰富但极少外显，表达内心感受让你感到脆弱和不自在。'};
  }

  // D3: 冲突应对风格 (0=直面, 100=回避)
  scoreD3() {
    const map = {
      Q5: {A:0, B:30, C:45, D:85},
      Q9: {A:0, B:35, C:55, D:90},
      Q11: {A:0, B:35, C:45, D:65}
    };
    const vals = [map.Q5[this.ans(5)], map.Q9[this.ans(9)], map.Q11[this.ans(11)]];
    const avg = vals.reduce((a,b)=>a+b,0)/vals.length;
    this.scores.d3 = Math.round(avg);
    if (avg <= 25) this.classifications.d3 = {type:'主动沟通型', desc:'你相信直面问题是解决冲突的最好方式，不回避、不拖延。'};
    else if (avg <= 50) this.classifications.d3 = {type:'冷静协调型', desc:'你会在情绪平复后寻求沟通，相信冷静比激烈交锋更有效。'};
    else if (avg <= 70) this.classifications.d3 = {type:'观察适应型', desc:'你在冲突中先观察对方的态度再决定自己的策略，灵活但有保留。'};
    else this.classifications.d3 = {type:'回避退让型', desc:'冲突让你感到强烈的不适，你的本能是维持和谐、避免正面交锋。'};
  }

  // D4: 亲密距离 (0=高融合, 100=高独立)
  scoreD4() {
    const map = {
      Q2: {A:20, B:35, C:25, D:65},
      Q4: {A:0, B:30, C:55, D:80},
      Q14: {A:0, B:30, C:60, D:85}
    };
    const vals = [map.Q2[this.ans(2)], map.Q4[this.ans(4)], map.Q14[this.ans(14)]];
    const avg = vals.reduce((a,b)=>a+b,0)/vals.length;
    this.scores.d4 = Math.round(avg);
    if (avg <= 25) this.classifications.d4 = {type:'高融合需求', desc:'你享受和伴侣高度融合的生活，分享和陪伴是亲密的核心。'};
    else if (avg <= 50) this.classifications.d4 = {type:'平衡型', desc:'你在亲密和独立之间找到了相对舒适的平衡点。'};
    else if (avg <= 70) this.classifications.d4 = {type:'高独立需求', desc:'独处是你重要的能量来源，在爱里你需要明确的个人边界。'};
    else this.classifications.d4 = {type:'高度独立型', desc:'你视独立为自我完整性的基石，不希望任何关系侵蚀你的个人空间。'};
  }

  // D5: 爱的语言 - 发送端 & 接收端
  scoreD5() {
    const giveMap = {
      Q6: {A:'分析解决', B:'灵活回应', C:'专注倾听', D:'经验分享'},
      Q11: {A:'坦诚对话', B:'肢体接触', C:'贴心行动', D:'给予空间'}
    };
    const receiveMap = {
      Q18: {A:'肯定的言语', B:'贴心的行动', C:'用心的礼物', D:'高质量的陪伴'}
    };
    this.classifications.d5 = {
      giving: [giveMap.Q6[this.ans(6)], giveMap.Q11[this.ans(11)]],
      receiving: receiveMap.Q18[this.ans(18)]
    };
  }

  // D6: 关系安全感
  scoreD6() {
    const map = {
      Q8: {A:0, B:30, C:55, D:75},
      Q16: {A:0, B:40, C:70, D:85},
      Q17: {A:10, B:35, C:60, D:45}
    };
    const vals = [map.Q8[this.ans(8)], map.Q16[this.ans(16)], map.Q17[this.ans(17)]];
    const avg = vals.reduce((a,b)=>a+b,0)/vals.length;
    this.scores.d6 = Math.round(avg);
    if (avg <= 25) this.classifications.d6 = {type:'主动确认型', desc:'感到不安时你会主动沟通确认，而不是在心里猜测。'};
    else if (avg <= 50) this.classifications.d6 = {type:'平衡警觉型', desc:'你会在观察和确认之间寻找平衡，不轻易下结论。'};
    else if (avg <= 70) this.classifications.d6 = {type:'内部消化型', desc:'安全感受到威胁时，你的第一反应是向内消化，暗自观察。'};
    else this.classifications.d6 = {type:'高度警觉型', desc:'你对关系中的威胁信号高度敏感，防御系统随时待命。'};
  }

  // D7: 情感核心驱动力
  scoreD7() {
    // Qualitative analysis based on multiple answers
    const q1 = this.ans(1), q2 = this.ans(2), q3 = this.ans(3);
    const q12 = this.ans(12), q13 = this.ans(13), q15 = this.ans(15);

    // Count driving forces
    let drives = { understood:0, safe:0, grow:0, free:0 };

    // Q1: what makes heart flutter
    if (q1==='A') drives.understood+=2;
    if (q1==='B') { drives.understood+=1; drives.safe+=1; }
    if (q1==='C') drives.grow+=1;
    if (q1==='D') drives.safe+=2;

    // Q2: fulfillment
    if (q2==='A') drives.understood+=2;
    if (q2==='B') drives.safe+=1;
    if (q2==='C') drives.grow+=2;
    if (q2==='D') { drives.free+=2; drives.safe+=1; }

    // Q3: attraction
    if (q3==='A') drives.understood+=2;
    if (q3==='B') { drives.understood+=1; drives.safe+=1; }
    if (q3==='C') { drives.grow+=1; drives.free+=1; }
    if (q3==='D') drives.safe+=2;

    // Q12: 5-year outlook
    if (q12==='A') { drives.grow+=2; drives.free+=1; }
    if (q12==='B') drives.safe+=2;
    if (q12==='C') drives.free+=2;
    if (q12==='D') { drives.understood+=1; drives.grow+=1; }

    // Q13: ideal relationship
    if (q13==='A') drives.grow+=2;
    if (q13==='B') drives.understood+=2;
    if (q13==='C') drives.safe+=2;
    if (q13==='D') { drives.free+=1; drives.grow+=1; }

    // Q15: attitude to partner flaws
    if (q15==='A') drives.safe+=1;
    if (q15==='B') { drives.grow+=1; drives.understood+=1; }
    if (q15==='C') drives.grow+=2;
    if (q15==='D') { drives.free+=2; drives.safe-=1; }

    const sorted = Object.entries(drives).sort((a,b)=>b[1]-a[1]);
    this.classifications.d7 = {
      primary: sorted[0][0],
      primaryLabel: { understood:'追求被理解', safe:'追求安全感', grow:'追求共同成长', free:'追求自由与自我' }[sorted[0][0]],
      scores: drives,
      secondary: sorted[1][0],
      deepestDesire: {
        understood: '被真正地"看见"和"懂得"——精神的被理解胜过一切',
        safe: '不会突然失去的、可以放心把自己交出去的关系',
        grow: '两个人并肩变得更好，互相成就而非互相消耗',
        free: '一段不会让你失去自我的关系——爱是加分项，不是必需品'
      }[sorted[0][0]],
      deepestFear: {
        understood: '不被看见、不被理解、在关系中感到孤独',
        safe: '被抛弃、被背叛、信任落空',
        grow: '被拖累、停滞不前、在关系中失去方向',
        free: '被控制、被吞噬、因爱失去自我'
      }[sorted[0][0]]
    };
  }

    if (['C','D'].includes(a[7]) && ['C','D'].includes(a[10]) && ['C','D'].includes(a[16])) {

        text: `你在个人空间（Q14）、信任威胁（Q16）和脆弱表达（Q10）三个关键问题上都选择了高度防御的策略。这是一个完整的"情感围墙"：你既需要大量的独处来维持自我，又在感到不安时疏远而非靠近，而且几乎不展示脆弱。<br><br><b>这通常意味着什么：</b>这种强度的防御，往往说明"独立"对你来说不仅是偏好，更是生存策略。你可能在过去的经历中学会了——依赖别人是危险的，只有靠自己才是最安全的。<br><br><b>它在关系中可能表现为：</b>你在恋爱中可能会被伴侣评价为"冷淡"或"不需要我"——而这恰恰是你最不希望对方感受到的。因为围墙里不是空的，只是被保护得太好了。`

    if (a[14]==='A' && a[16]==='D') {
      ti.push({id:'B1', priority:'high', category:'矛盾与张力模式', title:'渴望与恐惧的拉锯',
        text: `你的答案中存在一个重要的矛盾：在亲密距离上（Q14），你希望"融合在一起，尽可能多地分享彼此的生活"；但在信任受到威胁时（Q16），你的反应却是"疏远，用冷淡保护自己"。这是恐惧型（矛盾型）依恋的标志性特征——你既深深渴望亲密的连接，又在感受到不安全时本能地推开对方。<br><br><b>这通常意味着什么：</b>你不是"不想要"，而是"太想要了所以怕"。当一切顺利时你是最温暖的伴侣；但当一丝不确定出现时，你的第一反应是后退。<br><br><b>它在关系中可能表现为：</b>伴侣可能感到困惑——"你之前明明那么亲近，为什么突然变得冷淡？"这种冷热交替的模式如果未被理解，可能导致双方在追-逃的循环中耗尽精力。`

  // --- Label Generation ---
  generateLabel() {
    // Slot 1: 情感节奏 - based on D1 + D4
    const d1Score = this.scores.d1;
    const d4Score = this.scores.d4;
    if (d1Score > 65 && d4Score > 65) this.label.slot1 = {name:'慢热型', desc:'你需要时间确认一个人是否安全，感情升温慢，但一旦信任就非常坚定。'};
    else if (d1Score < 35 && d4Score < 45) this.label.slot1 = {name:'快速沉浸型', desc:'你容易快速投入一段感情，被情感连接驱动，爱得热烈而直接。'};
    else if ((d1Score > 55 && d4Score < 35) || (d1Score < 35 && d4Score > 65)) this.label.slot1 = {name:'波动型', desc:'你的情感温度不稳定，时而热烈靠近，时而冷淡疏远，在渴望与恐惧之间摇摆。'};
    else this.label.slot1 = {name:'恒温型', desc:'你的感情节奏稳健，不疾不徐，自然地推进关系，温度稳定。'};

    // Slot 2: 连接方式 - based on D2 + D5
    const d2Score = this.scores.d2;
    const receiving = this.classifications.d5.receiving;
    if (d2Score > 50 && (this.a[13]==='B' || this.a[1]==='A')) this.label.slot2 = {name:'深度连接者', desc:'你不满足于表面交流，渴望被真正"看见"和"理解"，质量>数量。'};
    else if ((this.a[6]==='A' || this.a[11]==='C' || receiving==='贴心的行动')) this.label.slot2 = {name:'行动守护者', desc:'你说"我爱你"的方式是做一桌菜、默默解决问题、在ta累的时候接过一切琐事。'};
    else if (d2Score < 35 || receiving==='肯定的言语') this.label.slot2 = {name:'灵魂共振者', desc:'你通过坦诚的对话和情感的流动来建立连接，言语是你最重要的桥梁。'};
    else this.label.slot2 = {name:'安静陪伴者', desc:'你不需要说话，彼此在身边各自做自己的事，就已经是最好的连接。'};

    // Slot 3: 核心驱动 - based on D7
    const drive = this.classifications.d7.primary;
    this.label.slot3 = {
      understood: {name:'追求被理解', desc:'你要的不是"我爱你"，而是"我懂你"——精神的被理解胜过一切。'},
      safe: {name:'追求安全感', desc:'你要的是不会突然失去的、可以放心把自己交出去的关系。'},
      grow: {name:'追求共同成长', desc:'你要的是两个人并肩变得更好，互相成就，而非互相消耗。'},
      free: {name:'追求自由与自我', desc:'你要的是一段不会让你失去自我的关系——爱是加分项，不是必需品。'}
    }[drive];
  }

  // --- Personalized label interpretation ---
  getLabelInterpretation() {
    const parts = [];
    if (this.label.slot1.name === '慢热型') parts.push('你的感情升温需要时间，不会轻易敞开，但一旦确认了一个人对你来说是安全的，你会用最深的方式去连接');
    else if (this.label.slot1.name === '恒温型') parts.push('你的感情节奏稳健自然，不疾不徐，每一段关系都有它自己的步调');
    else if (this.label.slot1.name === '快速沉浸型') parts.push('你爱得热烈而直接，一旦心动就会全身心投入');
    else parts.push('你的情感温度有自己的节奏，在渴望靠近和保护自我之间寻找平衡');

    if (this.label.slot2.name === '深度连接者') parts.push('你渴望的从来不是热闹的陪伴，而是被一个人真正"看见"和"懂得"');
    else if (this.label.slot2.name === '行动守护者') parts.push('你用行动而非言语来承载爱意——你爱的人可能不会常常听到"我爱你"，但一定会在每一个细节里感受到你的在乎');
    else if (this.label.slot2.name === '灵魂共振者') parts.push('对你来说，坦诚的对话和情感的真实流动，是两个人之间最重要的纽带');
    else parts.push('对你来说，最好的连接不是说了多少话，而是在一起的时候彼此有多自在');

    if (this.classifications.d7.primary === 'understood') parts.push('在爱里，你最深处要的不是承诺，不是物质，而是被一个人真正地"懂"');
    else if (this.classifications.d7.primary === 'safe') parts.push('在爱里，你最需要的是一个可以放心卸下所有防御的港湾');
    else if (this.classifications.d7.primary === 'grow') parts.push('在爱里，你要的是两个人并肩向上——互相成就，而非互相消耗');
    else parts.push('在爱里，你最深的需求是保有完整的自己——爱是生命的加分项，而不是全部');

    return parts.join('；') + '。';
  }
}

// --- Helpers ---
function getOptionText(id, letter) {
  const q = QUESTIONS.find(q => q.id === id);
  return q ? q.options[letter] : '';
}
function getOptionShort(id, letter) {
  const text = getOptionText(id, letter);
  if (text.length > 30) return text.substring(0, 28) + '...';
  return text;
}

// --- Actions ---
function startQuiz() {
  answers = {};
  currentQuestion = 0;
  currentStage = 1;
  renderQuestion();
}

function selectAnswer(letter) {
  const q = QUESTIONS[currentQuestion];
  answers[q.id] = letter;

  if (currentQuestion < 17) {
    const nextQ = QUESTIONS[currentQuestion + 1];
    if (nextQ.stage > currentStage) {
      // Show stage transition
      const completedStage = currentStage;
      currentStage = nextQ.stage;
      currentQuestion++;
      renderTransition(completedStage);
    } else {
      currentQuestion++;
      renderQuestion();
    }
  } else {
    // Last question answered - show loading then results
    renderLoading();
  }
}

function continueQuiz() {
  renderQuestion();
}

function retakeQuiz() {
  answers = {};
  currentQuestion = 0;
  currentStage = 1;
  renderWelcome();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function shareResult() {
  const url = window.location.href;
  if (navigator.share) {
    navigator.share({
      title: '💕 情感人格深度解析',
      text: '来看看你在恋爱中的情感模式是什么样的？18道题，3-5分钟，深度解析你的情感人格。',
      url: url
    }).catch(() => copyToClipboard(url));
  } else {
    copyToClipboard(url);
  }
}

function copyToClipboard(text) {
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(() => showToast('✅ 链接已复制！发送给朋友一起测吧'));
  } else {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.left = '-9999px';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast('✅ 链接已复制！发送给朋友一起测吧');
  }
}

function showToast(msg) {
  const toast = document.createElement('div');
  toast.className = 'toast';
  toast.textContent = msg;
  document.body.appendChild(toast);
  setTimeout(() => {
    toast.style.opacity = '0';
    toast.style.transition = 'opacity 0.3s';
    setTimeout(() => document.body.removeChild(toast), 300);
  }, 2000);
}

// --- Init ---
renderWelcome();
